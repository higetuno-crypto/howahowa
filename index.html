<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>雪原サバイバル - Fixed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a2a3a;touch-action:none;user-select:none;font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif}
canvas{display:block;width:100vw;height:100vh}
#title-bar{position:fixed;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:center;z-index:11;pointer-events:none}
#title-text{background:linear-gradient(135deg,#ff6b35,#ff4500);color:#fff;padding:6px 20px;border-radius:0 0 16px 16px;font-weight:900;font-size:15px;letter-spacing:2px;box-shadow:0 3px 10px rgba(255,69,0,.3);text-shadow:1px 1px 2px rgba(0,0,0,.3)}
#hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:12;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:95vw}
.hud-item{background:rgba(255,255,255,.92);padding:6px 13px;border-radius:14px;font-weight:bold;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.15);white-space:nowrap}
#upgrade-panel{position:fixed;bottom:20px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:13;max-height:74vh;overflow-y:auto;padding-bottom:2px}
.upg-btn{padding:10px 14px;font-size:13px;border:none;border-radius:14px;color:#fff;font-weight:bold;cursor:pointer;pointer-events:auto;transition:transform .1s;text-align:left;min-width:155px;box-shadow:0 3px 0 rgba(0,0,0,.25)}
.upg-btn:active{transform:scale(.95)}
.upg-btn:disabled{opacity:.45;filter:grayscale(.45);cursor:not-allowed}
.upg-btn.locked{display:none}
.upg-btn.cap{background:linear-gradient(135deg,#4a9ede,#2a7ebe)}
.upg-btn.spd{background:linear-gradient(135deg,#5cc06a,#3aa04a)}
.upg-btn.worker{background:linear-gradient(135deg,#e8a04a,#c8803a)}
.upg-btn.worker-spd{background:linear-gradient(135deg,#ffd447,#e2a600);color:#463000}
.upg-btn.npc-cap{background:linear-gradient(135deg,#50b0c0,#3090a0)}
.upg-btn.build{background:linear-gradient(135deg,#c070d0,#9050a0)}
#dev-controls{position:fixed;top:12px;right:12px;z-index:14;display:flex;gap:6px}
.dev-btn{background:rgba(74,158,222,.9);color:#fff;border:none;padding:6px 10px;border-radius:6px;font-weight:bold;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.dev-btn.reset{background:rgba(224,48,48,.9)}
#zone-label{position:fixed;top:85px;left:50%;transform:translateX(-50%);z-index:12;pointer-events:none;font-size:16px;font-weight:bold;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5);opacity:0;transition:opacity .25s;text-align:center}
#level-popup{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);z-index:25;pointer-events:none;opacity:0;transition:opacity .4s;text-align:center}
#level-popup .big{font-size:32px;font-weight:900;color:#ffd700;text-shadow:0 0 20px rgba(255,200,0,.6),0 2px 4px rgba(0,0,0,.5)}
#level-popup .sub{font-size:16px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);margin-top:4px}
#touch-indicator{position:fixed;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);pointer-events:none;z-index:9;display:none;transform:translate(-50%,-50%)}
#touch-knob{position:absolute;top:50%;left:50%;width:36px;height:36px;margin:-18px;border-radius:50%;background:rgba(255,255,255,.3);pointer-events:none}
@media(max-width:680px){#hud{top:48px}.hud-item{font-size:13px;padding:5px 10px}#dev-controls{top:8px;right:8px}.dev-btn{padding:5px 8px;font-size:12px}#upgrade-panel{right:8px;bottom:12px}.upg-btn{font-size:12px;min-width:142px;padding:9px 11px}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dev-controls">
  <button class="dev-btn" onclick="saveGame(true)">💾 セーブ</button>
  <button class="dev-btn reset" onclick="resetGame()">🔄 リセット</button>
</div>
<div id="title-bar"><div id="title-text">雪原サバイバル</div></div>
<div id="hud">
  <div class="hud-item" id="hud-money">💰 0</div>
  <div class="hud-item" id="hud-inv">🎒 0/5</div>
  <div class="hud-item" id="hud-level">⭐ Lv.1</div>
  <div class="hud-item" id="hud-workers">👷 0</div>
</div>
<div id="zone-label"></div>
<div id="level-popup"><div class="big"></div><div class="sub"></div></div>
<div id="upgrade-panel">
  <button class="upg-btn cap" id="btn-cap" onclick="upgradeCap()">🎒 容量UP (15G)</button>
  <button class="upg-btn spd" id="btn-spd" onclick="upgradeSpd()">👟 速度UP (20G)</button>
  <button class="upg-btn worker locked" id="btn-worker" onclick="hireWorker()">👷 仲間を雇う (30G)</button>
  <button class="upg-btn worker-spd locked" id="btn-worker-spd" onclick="upgradeWorkerSpd()">⚡ 仲間速度 (60G)</button>
  <button class="upg-btn npc-cap locked" id="btn-npc-cap" onclick="upgradeNpcCap()">📦 仲間容量 (40G)</button>
  <button class="upg-btn build locked" id="btn-fire-upg" onclick="upgradeCampfire()">🔥 焚き火強化 (50G)</button>
  <button class="upg-btn build locked" id="btn-dry" onclick="buildDryRack()">🐟 干物台を建設 (80G)</button>
  <button class="upg-btn build locked" id="btn-dry-upg" onclick="upgradeDryRack()">🐟 干物台強化 (70G)</button>
  <button class="upg-btn build locked" id="btn-hut" onclick="buildFishHut()">🏠 釣り小屋を建設 (150G)</button>
  <button class="upg-btn build locked" id="btn-hut-upg" onclick="upgradeHut()">🛠️ 小屋強化 (100G)</button>
</div>
<div id="touch-indicator"><div id="touch-knob"></div></div>
<script>
'use strict';

// ===== CANVAS =====
const C = document.getElementById('c');
const X = C.getContext('2d');
let W = 0, H = 0, SCALE = 1;
function resize(){
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
  SCALE = Math.min(W / 420, H / 750) * 1.1;
  SCALE = Math.max(0.72, Math.min(2.0, SCALE));
}
window.addEventListener('resize', resize);
resize();

// ===== ISO CAMERA =====
const cam = { x:0, y:0 };
function toIso(wx, wy){ return { x: wx - wy, y: (wx + wy) * 0.5 }; }
function toScreen(wx, wy){
  const iso = toIso(wx, wy);
  return { x: (iso.x - cam.x) * SCALE + W / 2, y: (iso.y - cam.y) * SCALE + H / 2 };
}
function screenToWorldDir(sx, sy){
  const wx = sx * 0.5 + sy;
  const wy = -sx * 0.5 + sy;
  const len = Math.hypot(wx, wy);
  return len > 0 ? { x: wx / len, y: wy / len } : { x:0, y:0 };
}

// ===== STATE =====
const SAVE_KEY = 'snow_survival_fixed_v2';
const XP_TABLE = [0,30,80,160,300,500,800,1200,1800,2600,3600,5000,7000,10000,15000,99999];
const PLAYER_FISHING_TIME = 0.55;

let money = 0;
let xp = 0;
let level = 1;
let capCost = 15;
let spdCost = 20;
let workerCost = 30;
let npcCapLevel = 0;
let npcCapCost = 40;
let npcSpdLevel = 1;
let npcSpdCost = 60;
let campfireLevel = 1;
let campfireUpgCost = 50;
let dryRackLevel = 1;
let dryRackUpgCost = 70;
let hutLevel = 1;
let hutUpgCost = 100;
let dryCost = 80;
let hutCost = 150;
let hasDryRack = false;
let hasFishHut = false;

const player = {
  x:300, y:490, speed:120, capacity:5,
  rawFish:0, cookedFish:0, driedFish:0,
  moving:false, walkPhase:0,
  actionKind:'', actionProgress:0, actionTimer:0
};

const LAKE = { cx:300, cy:80, rx:170, ry:90 };
const BASE = { x1:130, y1:340, x2:470, y2:640 };
const GATE = { x1:260, x2:340, y:340 };
const CAMPFIRE = { x:220, y:440, r:50 };
const SELLZONE = { x:380, y:440, r:50 };
const WORKERHUT = { x:220, y:560, r:48 };
const DRYRACK = { x:380, y:560, r:45 };
const FISHHUT = {
  x:300, y:180, r:48,
  stock:0, maxStock:20, timer:0,
  getInterval(){ return Math.max(0.28, 3.0 - (hutLevel - 1) * 0.48); },
  getAmount(){ return 1 + Math.floor((hutLevel - 1) / 2); }
};

let npcs = [];
let fishList = [];
let particles = [];
let floatingTexts = [];
let flyingItems = [];

const trees = [
  {x:70,y:250,s:1.1},{x:530,y:280,s:.9},{x:50,y:500,s:1},{x:550,y:480,s:1.2},
  {x:90,y:640,s:.8},{x:510,y:630,s:1},{x:60,y:100,s:1.1},{x:540,y:60,s:.9},
  {x:550,y:160,s:1},{x:80,y:400,s:.7},{x:500,y:370,s:.85},{x:150,y:30,s:.7},
  {x:450,y:20,s:.8},{x:200,y:680,s:.9},{x:400,y:670,s:.75}
];
const snowballs = [{x:490,y:300,r:12},{x:110,y:310,r:10},{x:470,y:550,r:8}];
let fencePosts = [];
let bridgePlanks = [];

function totalCarry(e){ return (e.rawFish || 0) + (e.cookedFish || 0) + (e.driedFish || 0); }
function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1, y2-y1); }
function distSq(x1,y1,x2,y2){ return (x2-x1)**2 + (y2-y1)**2; }
function inLake(wx, wy){ return ((wx - LAKE.cx) / LAKE.rx) ** 2 + ((wy - LAKE.cy) / LAKE.ry) ** 2 < 1; }
function nearCampfire(wx, wy){ return dist(wx, wy, CAMPFIRE.x, CAMPFIRE.y) < CAMPFIRE.r; }
function nearSellZone(wx, wy){ return dist(wx, wy, SELLZONE.x, SELLZONE.y) < SELLZONE.r; }
function nearWorkerHut(wx, wy){ return dist(wx, wy, WORKERHUT.x, WORKERHUT.y) < WORKERHUT.r; }
function nearDryRackSite(wx, wy){ return dist(wx, wy, DRYRACK.x, DRYRACK.y) < DRYRACK.r; }
function nearFishHutSite(wx, wy){ return dist(wx, wy, FISHHUT.x, FISHHUT.y) < FISHHUT.r; }
function nearDryRack(wx, wy){ return hasDryRack && nearDryRackSite(wx, wy); }
function nearFishHut(wx, wy){ return hasFishHut && nearFishHutSite(wx, wy); }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function getCookTime(){ return Math.max(0.12, 0.35 - (campfireLevel - 1) * 0.045); }
function getNpcCookTime(){ return Math.max(0.08, getCookTime() * 0.65); }
function getDryTime(){ return Math.max(0.14, 0.45 - (dryRackLevel - 1) * 0.055); }
function getNpcDryTime(){ return Math.max(0.10, getDryTime() * 0.75); }

function buildFence(){
  fencePosts = [];
  const step = 22;
  for(let x = BASE.x1; x <= BASE.x2; x += step) fencePosts.push({x, y:BASE.y2});
  for(let x = BASE.x1; x <= BASE.x2; x += step){
    if(x >= GATE.x1 && x <= GATE.x2) continue;
    fencePosts.push({x, y:BASE.y1});
  }
  for(let y = BASE.y1; y <= BASE.y2; y += step) fencePosts.push({x:BASE.x1, y});
  for(let y = BASE.y1; y <= BASE.y2; y += step) fencePosts.push({x:BASE.x2, y});
}
function buildBridge(){
  bridgePlanks = [];
  for(let y = 200; y < 345; y += 14) bridgePlanks.push({x:300, y, w:55});
}
buildFence();
buildBridge();

function spawnFish(){
  fishList = [];
  for(let i = 0; i < 20; i++){
    const angle = Math.random() * Math.PI * 2;
    const rx = (0.25 + Math.random() * 0.7) * LAKE.rx;
    const ry = (0.25 + Math.random() * 0.7) * LAKE.ry;
    fishList.push({
      x: LAKE.cx + Math.cos(angle) * rx,
      y: LAKE.cy + Math.sin(angle) * ry,
      alive:true, respawn:0,
      swimSpeed:.3 + Math.random() * .5,
      swimAngle:Math.random() * Math.PI * 2,
      phase:Math.random() * Math.PI * 2
    });
  }
}
spawnFish();

function createNPC(){
  return {
    x:260 + Math.random() * 80,
    y:520 + Math.random() * 40,
    speed:68 + (npcSpdLevel - 1) * 14,
    capacity:3 + npcCapLevel * 2,
    rawFish:0, cookedFish:0, driedFish:0,
    state:'goFish', targetX:300, targetY:80, targetSet:false,
    moving:false, walkPhase:0, stateTimer:0,
    fishTimeLimit:Math.max(.35, 1.05 - (npcSpdLevel - 1) * .12)
  };
}
function refreshNPCStats(){
  for(const npc of npcs){
    npc.speed = 68 + (npcSpdLevel - 1) * 14;
    npc.capacity = 3 + npcCapLevel * 2;
    npc.fishTimeLimit = Math.max(.35, 1.05 - (npcSpdLevel - 1) * .12);
  }
}

// ===== INPUT =====
const touch = { active:false, startX:0, startY:0, dx:0, dy:0 };
const keys = {};
const touchIndicator = document.getElementById('touch-indicator');
const touchKnob = document.getElementById('touch-knob');
const DEAD_ZONE = 10;

function isUIElement(el){
  while(el){
    if(el.id === 'upgrade-panel' || el.id === 'dev-controls' || el.classList?.contains('upg-btn') || el.classList?.contains('dev-btn')) return true;
    el = el.parentElement;
  }
  return false;
}
C.addEventListener('touchstart', e => {
  if(isUIElement(e.target)) return;
  e.preventDefault();
  const t = e.touches[0];
  touch.active = true; touch.startX = t.clientX; touch.startY = t.clientY; touch.dx = 0; touch.dy = 0;
  touchIndicator.style.display = 'block';
  touchIndicator.style.left = touch.startX + 'px';
  touchIndicator.style.top = touch.startY + 'px';
});
C.addEventListener('touchmove', e => {
  if(!touch.active) return;
  e.preventDefault();
  const t = e.touches[0];
  touch.dx = t.clientX - touch.startX;
  touch.dy = t.clientY - touch.startY;
  const len = Math.hypot(touch.dx, touch.dy);
  const max = 36;
  const k = len > max ? max / len : 1;
  touchKnob.style.transform = `translate(${touch.dx * k}px, ${touch.dy * k}px)`;
});
C.addEventListener('touchend', e => {
  e.preventDefault();
  touch.active = false; touch.dx = 0; touch.dy = 0;
  touchIndicator.style.display = 'none';
  touchKnob.style.transform = 'translate(0,0)';
});
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ===== UI / UPGRADES =====
function canSpend(cost){ return money >= cost; }
function spend(cost){ if(money < cost) return false; money -= cost; updateHUD(); return true; }
function updateButtonState(){
  const set = (id, cost, text, visible=true, disabled=false) => {
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.textContent = text;
    btn.classList.toggle('locked', !visible);
    btn.disabled = disabled || (visible && cost !== null && money < cost);
  };
  const atCampfire = nearCampfire(player.x, player.y);
  const atWorkerHut = nearWorkerHut(player.x, player.y);
  const atDrySite = nearDryRackSite(player.x, player.y);
  const atFishHut = nearFishHutSite(player.x, player.y);

  // 常時表示：プレイヤー自身の強化だけ
  set('btn-cap', capCost, `🎒 容量UP (${capCost}G)`, true, false);
  set('btn-spd', spdCost, `👟 速度UP (${spdCost}G)`, true, false);

  // 仲間小屋の近く限定
  set('btn-worker', workerCost, `👷 仲間を雇う (${workerCost}G)`, atWorkerHut, false);
  set('btn-worker-spd', npcSpdCost, `⚡ 仲間速度 Lv.${npcSpdLevel} (${npcSpdCost}G)`, atWorkerHut && (level >= 2 || npcs.length > 0), false);
  set('btn-npc-cap', npcCapCost, `📦 仲間容量 Lv.${npcCapLevel + 1} (${npcCapCost}G)`, atWorkerHut && level >= 2, false);

  // 施設の近く限定
  set('btn-fire-upg', campfireUpgCost, `🔥 焚き火 Lv.${campfireLevel} 強化 (${campfireUpgCost}G)`, atCampfire, false);
  set('btn-dry', dryCost, `🐟 干物台を建設 (${dryCost}G)`, atDrySite && level >= 3 && !hasDryRack, false);
  set('btn-dry-upg', dryRackUpgCost, `🐟 干物台 Lv.${dryRackLevel} 強化 (${dryRackUpgCost}G)`, atDrySite && hasDryRack, false);
  set('btn-hut', hutCost, `🏠 釣り小屋を建設 (${hutCost}G)`, atFishHut && level >= 5 && !hasFishHut, false);
  set('btn-hut-upg', hutUpgCost, `🛠️ 小屋 Lv.${hutLevel} 強化 (${hutUpgCost}G)`, atFishHut && hasFishHut, false);
}
function updateHUD(){
  document.getElementById('hud-money').textContent = `💰 ${money}`;
  document.getElementById('hud-inv').textContent = `🎒 ${totalCarry(player)}/${player.capacity}`;
  document.getElementById('hud-level').textContent = `⭐ Lv.${level}`;
  document.getElementById('hud-workers').textContent = `👷 ${npcs.length}`;
  updateButtonState();
}
function gainXP(amount){
  xp += amount;
  while(level < XP_TABLE.length && xp >= XP_TABLE[level]){
    level++;
    showLevelUp();
  }
  updateHUD();
}
function showLevelUp(){
  const popup = document.getElementById('level-popup');
  const unlocks = [];
  if(level === 2) unlocks.push('仲間速度・仲間容量UP解放');
  if(level === 3) unlocks.push('干物台 建設可能');
  if(level === 5) unlocks.push('釣り小屋 建設可能');
  popup.querySelector('.big').textContent = `⭐ レベル ${level}!`;
  popup.querySelector('.sub').textContent = unlocks.length ? `🔓 ${unlocks.join(' / ')}` : '';
  popup.style.opacity = '1';
  setTimeout(() => popup.style.opacity = '0', 2200);
}
function addFloatingText(wx, wy, text, color='#fff'){
  const p = toIso(wx, wy);
  floatingTexts.push({x:p.x, y:p.y-30, text, color, life:1.2, alpha:1, vy:-30});
}
function spawnFlyingItem(fromWx, fromWy, toWx, toWy, type){
  flyingItems.push({fromX:fromWx, fromY:fromWy, toX:toWx, toY:toWy, type, progress:0, duration:.28});
}

function upgradeCap(){
  if(!spend(capCost)) return;
  player.capacity += 3;
  capCost = Math.floor(capCost * 1.55);
  addFloatingText(player.x, player.y, `🎒 容量 ${player.capacity}`, '#8bd4ff');
  updateHUD(); saveGame();
}
function upgradeSpd(){
  if(!spend(spdCost)) return;
  player.speed += 16;
  spdCost = Math.floor(spdCost * 1.6);
  addFloatingText(player.x, player.y, `👟 速度UP`, '#8cff9a');
  updateHUD(); saveGame();
}
function hireWorker(){
  if(!nearWorkerHut(player.x, player.y)) return;
  if(!spend(workerCost)) return;
  npcs.push(createNPC());
  workerCost = Math.floor(workerCost * 1.85);
  addFloatingText(player.x, player.y, `👷 仲間 +1`, '#ffcc70');
  gainXP(5);
  updateHUD(); saveGame();
}
function upgradeWorkerSpd(){
  if(!nearWorkerHut(player.x, player.y)) return;
  if(!spend(npcSpdCost)) return;
  npcSpdLevel++;
  npcSpdCost = Math.floor(npcSpdCost * 1.7);
  refreshNPCStats();
  addFloatingText(player.x, player.y, `⚡ 仲間速度 Lv.${npcSpdLevel}`, '#ffff66');
  gainXP(5);
  updateHUD(); saveGame();
}
function upgradeNpcCap(){
  if(!nearWorkerHut(player.x, player.y)) return;
  if(!spend(npcCapCost)) return;
  npcCapLevel++;
  npcCapCost = Math.floor(npcCapCost * 1.65);
  refreshNPCStats();
  addFloatingText(player.x, player.y, `📦 仲間容量 Lv.${npcCapLevel}`, '#80f0ff');
  gainXP(5);
  updateHUD(); saveGame();
}
function buildDryRack(){
  if(!nearDryRackSite(player.x, player.y)) return;
  if(hasDryRack || !spend(dryCost)) return;
  hasDryRack = true;
  addFloatingText(DRYRACK.x, DRYRACK.y, '🐟 干物台 完成', '#e8b0ff');
  gainXP(10);
  updateHUD(); saveGame();
}
function buildFishHut(){
  if(!nearFishHutSite(player.x, player.y)) return;
  if(hasFishHut || !spend(hutCost)) return;
  hasFishHut = true;
  addFloatingText(FISHHUT.x, FISHHUT.y, '🏠 釣り小屋 完成', '#e8b0ff');
  gainXP(12);
  updateHUD(); saveGame();
}
function upgradeCampfire(){
  if(!nearCampfire(player.x, player.y)) return;
  if(!spend(campfireUpgCost)) return;
  campfireLevel++;
  campfireUpgCost = Math.floor(campfireUpgCost * 1.55);
  addFloatingText(CAMPFIRE.x, CAMPFIRE.y, `🔥 焚き火 Lv.${campfireLevel} 焼き速度UP`, '#ffcc55');
  gainXP(5);
  updateHUD(); saveGame();
}
function upgradeDryRack(){
  if(!hasDryRack || !nearDryRackSite(player.x, player.y)) return;
  if(!spend(dryRackUpgCost)) return;
  dryRackLevel++;
  dryRackUpgCost = Math.floor(dryRackUpgCost * 1.6);
  addFloatingText(DRYRACK.x, DRYRACK.y, `🐟 干物台 Lv.${dryRackLevel} 乾燥速度UP`, '#ffc070');
  gainXP(6);
  updateHUD(); saveGame();
}
function upgradeHut(){
  if(!nearFishHutSite(player.x, player.y)) return;
  if(!hasFishHut || !spend(hutUpgCost)) return;
  hutLevel++;
  FISHHUT.maxStock += 30;
  hutUpgCost = Math.floor(hutUpgCost * 1.6);
  addFloatingText(player.x, player.y, `🏠 小屋 Lv.${hutLevel} 速度UP/容量${FISHHUT.maxStock}`, '#ffaa00');
  gainXP(8);
  updateHUD(); saveGame();
}

// ===== UPDATE =====
function getMoveVector(){
  let vx = 0, vy = 0;
  if(keys.w || keys.arrowup) vy -= 1;
  if(keys.s || keys.arrowdown) vy += 1;
  if(keys.a || keys.arrowleft) vx -= 1;
  if(keys.d || keys.arrowright) vx += 1;
  if(touch.active && Math.hypot(touch.dx, touch.dy) > DEAD_ZONE){
    vx += touch.dx;
    vy += touch.dy;
  }
  const len = Math.hypot(vx, vy);
  if(len <= 0) return {x:0,y:0};
  return screenToWorldDir(vx / len, vy / len);
}
function updatePlayer(dt){
  const mv = getMoveVector();
  player.moving = Math.hypot(mv.x, mv.y) > 0;
  if(player.moving){
    player.x += mv.x * player.speed * dt;
    player.y += mv.y * player.speed * dt;
    player.walkPhase += dt;
  }
  player.x = clamp(player.x, 35, 565);
  player.y = clamp(player.y, 20, 690);
  updatePlayerActions(dt);
}
function updatePlayerActions(dt){
  player.actionKind = '';
  player.actionProgress = 0;
  if(player.moving){ player.actionTimer = 0; return; }

  if(inLake(player.x, player.y) && totalCarry(player) < player.capacity){
    player.actionKind = 'fishing';
    player.actionTimer += dt;
    player.actionProgress = player.actionTimer / PLAYER_FISHING_TIME;
    if(player.actionTimer >= PLAYER_FISHING_TIME){
      player.actionTimer = 0;
      const fish = getNearestAliveFish(player.x, player.y, 48);
      if(fish){ fish.alive = false; fish.respawn = 2.0; }
      player.rawFish++;
      gainXP(2);
      addFloatingText(player.x, player.y, '+魚', '#ffb070');
    }
    return;
  }
  if(nearFishHut(player.x, player.y) && totalCarry(player) < player.capacity && FISHHUT.stock >= 1){
    player.actionKind = 'hut';
    player.actionTimer += dt;
    player.actionProgress = player.actionTimer / .18;
    if(player.actionTimer >= .18){
      player.actionTimer = 0;
      const take = Math.min(player.capacity - totalCarry(player), Math.floor(FISHHUT.stock), Math.max(1, FISHHUT.getAmount()));
      if(take > 0){
        FISHHUT.stock -= take;
        player.rawFish += take;
        addFloatingText(player.x, player.y, `+${take}魚`, '#ffb070');
      }
    }
    return;
  }
  if(nearCampfire(player.x, player.y) && player.rawFish > 0){
    player.actionKind = 'cooking';
    player.actionTimer += dt;
    const cookTime = getCookTime();
    player.actionProgress = player.actionTimer / cookTime;
    if(player.actionTimer >= cookTime){
      player.actionTimer = 0;
      player.rawFish--; player.cookedFish++;
      spawnFlyingItem(player.x, player.y, CAMPFIRE.x, CAMPFIRE.y, 'cooked');
      addFloatingText(player.x, player.y, '焼き魚', '#ffcc55');
    }
    return;
  }
  if(nearDryRack(player.x, player.y) && player.cookedFish > 0){
    player.actionKind = 'drying';
    player.actionTimer += dt;
    const dryTime = getDryTime();
    player.actionProgress = player.actionTimer / dryTime;
    if(player.actionTimer >= dryTime){
      player.actionTimer = 0;
      player.cookedFish--; player.driedFish++;
      addFloatingText(player.x, player.y, '干物', '#ffc070');
    }
    return;
  }
  if(nearSellZone(player.x, player.y) && (player.cookedFish > 0 || player.driedFish > 0)){
    player.actionKind = 'selling';
    player.actionTimer += dt;
    player.actionProgress = player.actionTimer / .2;
    if(player.actionTimer >= .2){
      player.actionTimer = 0;
      if(player.driedFish > 0){
        player.driedFish--; money += 10; gainXP(3); addFloatingText(player.x, player.y, '+10G', '#ffd700');
      }else if(player.cookedFish > 0){
        player.cookedFish--; money += 5; gainXP(2); addFloatingText(player.x, player.y, '+5G', '#ffd700');
      }
      updateHUD();
    }
    return;
  }
  player.actionTimer = 0;
}
function getNearestAliveFish(x,y,maxDist){
  let best = null, bestD = maxDist;
  for(const f of fishList){
    if(!f.alive) continue;
    const d = dist(x,y,f.x,f.y);
    if(d < bestD){ bestD = d; best = f; }
  }
  return best;
}
function moveToward(entity, tx, ty, dt){
  const dx = tx - entity.x, dy = ty - entity.y;
  const d = Math.hypot(dx, dy);
  if(d > 3){
    entity.x += dx / d * entity.speed * dt;
    entity.y += dy / d * entity.speed * dt;
    entity.moving = true;
  }else{
    entity.moving = false;
  }
}
function updateNPC(npc, dt){
  npc.walkPhase += dt;
  const carried = totalCarry(npc);
  if(carried >= npc.capacity && !['goCook','cooking','goDry','drying','goSell','selling'].includes(npc.state)){
    npc.state = 'goCook'; npc.targetSet = false;
  }
  switch(npc.state){
    case 'goFish': {
      if(hasFishHut && FISHHUT.stock >= Math.min(3, npc.capacity)){
        npc.state = 'goHut'; npc.targetSet = false; break;
      }
      if(!npc.targetSet){
        npc.targetX = LAKE.cx + (Math.random() - .5) * 110;
        npc.targetY = LAKE.cy + (Math.random() - .5) * 55;
        npc.targetSet = true;
      }
      moveToward(npc, npc.targetX, npc.targetY, dt);
      if(inLake(npc.x, npc.y)){ npc.state = 'fishing'; npc.stateTimer = 0; npc.targetSet = false; }
      break;
    }
    case 'goHut': {
      if(!npc.targetSet){ npc.targetX = FISHHUT.x; npc.targetY = FISHHUT.y + 20; npc.targetSet = true; }
      moveToward(npc, npc.targetX, npc.targetY, dt);
      if(dist(npc.x,npc.y,FISHHUT.x,FISHHUT.y) < FISHHUT.r + 8){
        const take = Math.min(npc.capacity - totalCarry(npc), Math.floor(FISHHUT.stock));
        if(take > 0){ FISHHUT.stock -= take; npc.rawFish += take; }
        npc.state = npc.rawFish > 0 ? 'goCook' : 'goFish';
        npc.targetSet = false;
      }
      break;
    }
    case 'fishing': {
      const fish = getNearestAliveFish(npc.x, npc.y, 90);
      if(fish){
        moveToward(npc, fish.x, fish.y, dt);
        if(dist(npc.x,npc.y,fish.x,fish.y) < 24){
          npc.moving = false;
          npc.stateTimer += dt;
          if(npc.stateTimer >= npc.fishTimeLimit){
            npc.stateTimer = 0;
            fish.alive = false; fish.respawn = 2.2;
            npc.rawFish++;
          }
        }
      }else{
        npc.state = 'goFish'; npc.targetSet = false;
      }
      if(totalCarry(npc) >= npc.capacity){ npc.state = 'goCook'; npc.targetSet = false; }
      break;
    }
    case 'goCook': {
      if(!npc.targetSet){ npc.targetX = CAMPFIRE.x + (Math.random() - .5) * 20; npc.targetY = CAMPFIRE.y + (Math.random() - .5) * 20; npc.targetSet = true; }
      moveToward(npc, npc.targetX, npc.targetY, dt);
      if(nearCampfire(npc.x, npc.y)){ npc.state = 'cooking'; npc.stateTimer = getNpcCookTime(); npc.targetSet = false; }
      break;
    }
    case 'cooking': {
      npc.moving = false;
      npc.stateTimer -= dt;
      if(npc.stateTimer <= 0){
        if(npc.rawFish > 0){ npc.rawFish--; npc.cookedFish++; npc.stateTimer = getNpcCookTime(); }
        else{ npc.state = hasDryRack && npc.cookedFish > 0 && Math.random() < .55 ? 'goDry' : 'goSell'; npc.targetSet = false; }
      }
      break;
    }
    case 'goDry': {
      if(!npc.targetSet){ npc.targetX = DRYRACK.x + (Math.random() - .5) * 15; npc.targetY = DRYRACK.y + (Math.random() - .5) * 15; npc.targetSet = true; }
      moveToward(npc, npc.targetX, npc.targetY, dt);
      if(nearDryRack(npc.x, npc.y)){ npc.state = 'drying'; npc.stateTimer = getNpcDryTime(); npc.targetSet = false; }
      break;
    }
    case 'drying': {
      npc.moving = false;
      npc.stateTimer -= dt;
      if(npc.stateTimer <= 0){
        if(npc.cookedFish > 0){ npc.cookedFish--; npc.driedFish++; npc.stateTimer = getNpcDryTime(); }
        else{ npc.state = 'goSell'; npc.targetSet = false; }
      }
      break;
    }
    case 'goSell': {
      if(!npc.targetSet){ npc.targetX = SELLZONE.x + (Math.random() - .5) * 22; npc.targetY = SELLZONE.y + (Math.random() - .5) * 22; npc.targetSet = true; }
      moveToward(npc, npc.targetX, npc.targetY, dt);
      if(nearSellZone(npc.x,npc.y)){ npc.state = 'selling'; npc.stateTimer = .14; npc.targetSet = false; }
      break;
    }
    case 'selling': {
      npc.moving = false;
      npc.stateTimer -= dt;
      if(npc.stateTimer <= 0){
        if(npc.driedFish > 0){ npc.driedFish--; money += 10; gainXP(2); addFloatingText(npc.x,npc.y,'+10G','#ffd700'); npc.stateTimer=.12; }
        else if(npc.cookedFish > 0){ npc.cookedFish--; money += 5; gainXP(1); addFloatingText(npc.x,npc.y,'+5G','#ffd700'); npc.stateTimer=.12; }
        else{ npc.state = hasFishHut && FISHHUT.stock >= 3 ? 'goHut' : 'goFish'; npc.targetSet = false; updateHUD(); }
      }
      break;
    }
  }
}
function updateHutProduction(dt){
  if(!hasFishHut) return;
  FISHHUT.timer += dt;
  const interval = FISHHUT.getInterval();
  while(FISHHUT.timer >= interval){
    FISHHUT.timer -= interval;
    if(FISHHUT.stock < FISHHUT.maxStock){
      FISHHUT.stock = Math.min(FISHHUT.maxStock, FISHHUT.stock + FISHHUT.getAmount());
    }else{
      FISHHUT.timer = 0;
      break;
    }
  }
}
function updateFish(dt){
  for(const f of fishList){
    if(f.alive){
      f.phase += dt;
      f.swimAngle += Math.sin(f.phase * f.swimSpeed) * .003;
      f.x += Math.cos(f.swimAngle) * 4 * dt;
      f.y += Math.sin(f.swimAngle) * 2 * dt;
      if(!inLake(f.x, f.y)){
        const a = Math.atan2(f.y - LAKE.cy, f.x - LAKE.cx);
        f.x = LAKE.cx + Math.cos(a) * LAKE.rx * .85;
        f.y = LAKE.cy + Math.sin(a) * LAKE.ry * .75;
        f.swimAngle += Math.PI;
      }
    }else{
      f.respawn -= dt;
      if(f.respawn <= 0){
        const angle = Math.random() * Math.PI * 2;
        f.x = LAKE.cx + Math.cos(angle) * LAKE.rx * (.25 + Math.random() * .65);
        f.y = LAKE.cy + Math.sin(angle) * LAKE.ry * (.25 + Math.random() * .65);
        f.alive = true;
      }
    }
  }
}
function updateParticles(dt){
  if(Math.random() < .45) spawnSnowParticle();
  if(Math.random() < .2) spawnSmokeParticle();
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if(p.life <= 0) particles.splice(i, 1);
  }
  for(let i = floatingTexts.length - 1; i >= 0; i--){
    const ft = floatingTexts[i];
    ft.y += ft.vy * dt;
    ft.life -= dt;
    ft.alpha = Math.max(0, ft.life / 1.2);
    if(ft.life <= 0) floatingTexts.splice(i, 1);
  }
  for(let i = flyingItems.length - 1; i >= 0; i--){
    const item = flyingItems[i];
    item.progress += dt / item.duration;
    if(item.progress >= 1) flyingItems.splice(i, 1);
  }
}
function spawnSnowParticle(){
  particles.push({
    x: cam.x + (Math.random() - .5) * W / SCALE * 1.6,
    y: cam.y - H / SCALE * .6,
    vx: -12 + Math.random() * 8,
    vy: 20 + Math.random() * 20,
    life: 4 + Math.random() * 3,
    size: 1.4 + Math.random() * 2.4,
    type:'snow'
  });
}
function spawnSmokeParticle(){
  const iso = toIso(CAMPFIRE.x, CAMPFIRE.y);
  particles.push({
    x: iso.x + (Math.random() - .5) * 10,
    y: iso.y - 20 - Math.random() * 5,
    vx: (Math.random() - .5) * 8,
    vy: -18 - Math.random() * 12,
    life:.6 + Math.random() * .5,
    size:2 + Math.random() * 3,
    type:'smoke'
  });
}
function updateZoneLabel(){
  let label = '';
  if(inLake(player.x, player.y)) label = totalCarry(player) >= player.capacity ? '🎒 持ち物がいっぱい' : '🌊 釣り中...';
  else if(nearFishHutSite(player.x, player.y)) label = hasFishHut ? `🏠 小屋 Lv.${hutLevel} / ${Math.floor(FISHHUT.stock)}/${FISHHUT.maxStock}` : (level >= 5 ? '🏠 釣り小屋予定地：建設できます' : '🏠 釣り小屋予定地：Lv.5で解放');
  else if(nearCampfire(player.x, player.y)) label = player.rawFish > 0 ? `🔥 焼いています... Lv.${campfireLevel}` : `🔥 焚き火 Lv.${campfireLevel}`;
  else if(nearDryRackSite(player.x, player.y)) label = hasDryRack ? (player.cookedFish > 0 ? `🐟 干物作成中... Lv.${dryRackLevel}` : `🐟 干物台 Lv.${dryRackLevel}`) : (level >= 3 ? '🐟 干物台予定地：建設できます' : '🐟 干物台予定地：Lv.3で解放');
  else if(nearWorkerHut(player.x, player.y)) label = '👷 仲間小屋：雇用 / 速度 / 容量を強化';
  else if(nearSellZone(player.x, player.y)) label = (player.cookedFish + player.driedFish) > 0 ? '🏪 販売中...' : '🏪 販売所';
  const el = document.getElementById('zone-label');
  el.textContent = label;
  el.style.opacity = label ? '1' : '0';
}
function update(dt){
  updatePlayer(dt);
  for(const npc of npcs) updateNPC(npc, dt);
  updateFish(dt);
  updateHutProduction(dt);
  updateParticles(dt);
  cam.x += (toIso(player.x, player.y).x - cam.x) * Math.min(1, dt * 5);
  cam.y += (toIso(player.x, player.y).y - 40 - cam.y) * Math.min(1, dt * 5);
  updateZoneLabel();
  updateHUD();
}

function drawShadow(sx, sy, rx, ry){
  X.fillStyle = 'rgba(0,0,50,.10)';
  X.beginPath(); X.ellipse(sx, sy, rx * SCALE, ry * SCALE, 0, 0, Math.PI * 2); X.fill();
}
function drawGround(){
  const sky = X.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#c8dff0'); sky.addColorStop(.3,'#d8e8f0'); sky.addColorStop(1,'#e8f0f8');
  X.fillStyle = sky; X.fillRect(0,0,W,H);

  X.fillStyle = '#f0f2f8';
  X.beginPath(); X.moveTo(corners[0].x,corners[0].y); for(let i=1;i<corners.length;i++) X.lineTo(corners[i].x,corners[i].y); X.closePath(); X.fill();
  X.fillStyle = 'rgba(220,225,240,.5)';

}
function drawLake(){

function drawSellStand(wx,wy){
  const p=toScreen(wx,wy), sc=SCALE;
  X.fillStyle='#b89050'; X.beginPath(); X.moveTo(p.x,p.y-16*sc); X.lineTo(p.x+28*sc,p.y-8*sc); X.lineTo(p.x,p.y); X.lineTo(p.x-28*sc,p.y-8*sc); X.closePath(); X.fill();
  X.fillStyle='#a07838'; X.beginPath(); X.moveTo(p.x-28*sc,p.y-8*sc); X.lineTo(p.x,p.y); X.lineTo(p.x,p.y+6*sc); X.lineTo(p.x-28*sc,p.y-2*sc); X.closePath(); X.fill();
  X.fillStyle='#c8a060'; X.beginPath(); X.moveTo(p.x,p.y); X.lineTo(p.x+28*sc,p.y-8*sc); X.lineTo(p.x+28*sc,p.y-2*sc); X.lineTo(p.x,p.y+6*sc); X.closePath(); X.fill();
  X.fillStyle='rgba(255,255,255,.85)'; X.font=`bold ${12*sc}px sans-serif`; X.textAlign='center'; X.fillText('🏪 販売所',p.x,p.y+20*sc);
  drawCoinPile(p.x+34*sc,p.y+2*sc,sc);
}
function drawCoinPile(bx,by,sc){
  if(money <= 0) return;
  const totalCoins=Math.min(50,Math.ceil(money/5)), per=5, stacks=Math.ceil(totalCoins/per);
  for(let i=0;i<stacks;i++){
    const row=Math.floor(i/3), col=i%3, ox=(col-1)*10*sc+row*5*sc, oy=(col-1)*5*sc+row*7*sc, h=Math.min(per,totalCoins-i*per);
    for(let c=0;c<h;c++){
      const cx=bx+ox, cy=by+oy-c*2.5*sc;
      X.fillStyle='#c8960a'; X.beginPath(); X.ellipse(cx,cy+1.2*sc,5*sc,2.5*sc,0,0,Math.PI*2); X.fill();
      X.fillStyle='#ffd700'; X.beginPath(); X.ellipse(cx,cy,5*sc,2.5*sc,0,0,Math.PI*2); X.fill();
    }
  }
}
function drawWorkerHut(wx,wy){
  const p=toScreen(wx,wy), sc=SCALE;
  drawShadow(p.x,p.y+4*sc,30,14);
  X.fillStyle='#9b7040'; X.beginPath();
  X.moveTo(p.x,p.y-8*sc); X.lineTo(p.x+32*sc,p.y); X.lineTo(p.x,p.y+10*sc); X.lineTo(p.x-32*sc,p.y); X.closePath(); X.fill();
  X.fillStyle='#8f5f35'; X.beginPath();
  X.moveTo(p.x-32*sc,p.y); X.lineTo(p.x,p.y+10*sc); X.lineTo(p.x,p.y-24*sc); X.lineTo(p.x-32*sc,p.y-34*sc); X.closePath(); X.fill();
  X.fillStyle='#b47a42'; X.beginPath();
  X.moveTo(p.x,p.y+10*sc); X.lineTo(p.x+32*sc,p.y); X.lineTo(p.x+32*sc,p.y-34*sc); X.lineTo(p.x,p.y-24*sc); X.closePath(); X.fill();
  X.fillStyle='#6f4b2d'; X.beginPath();
  X.moveTo(p.x,p.y-50*sc); X.lineTo(p.x+38*sc,p.y-32*sc); X.lineTo(p.x,p.y-18*sc); X.lineTo(p.x-38*sc,p.y-32*sc); X.closePath(); X.fill();
  X.fillStyle='#eef3fa'; X.beginPath();
  X.moveTo(p.x,p.y-53*sc); X.lineTo(p.x+35*sc,p.y-34*sc); X.lineTo(p.x,p.y-23*sc); X.lineTo(p.x-35*sc,p.y-34*sc); X.closePath(); X.fill();
  X.fillStyle='#4a3322'; X.fillRect(p.x-6*sc,p.y-15*sc,12*sc,22*sc);
  X.fillStyle='rgba(255,255,255,.85)'; X.font=`bold ${11*sc}px sans-serif`; X.textAlign='center';
  X.fillText('👷 仲間小屋',p.x,p.y+20*sc);
}
function drawDryRack(wx,wy){
  const p=toScreen(wx,wy), sc=SCALE, t=performance.now()*.002;
  if(!hasDryRack){
    drawShadow(p.x,p.y+2*sc,20,8);
    X.strokeStyle='rgba(130,95,45,.75)'; X.lineWidth=2*sc; X.setLineDash([5*sc,4*sc]);
    X.beginPath(); X.ellipse(p.x,p.y-12*sc,26*sc,13*sc,0,0,Math.PI*2); X.stroke(); X.setLineDash([]);
    X.fillStyle='rgba(255,255,255,.72)'; X.font=`bold ${10*sc}px sans-serif`; X.textAlign='center'; X.fillText('🐟 干物台予定地',p.x,p.y+10*sc);
    return;
  }
  drawShadow(p.x,p.y+2*sc,22,10);
  X.fillStyle='#8a6828'; X.fillRect(p.x-22*sc,p.y-30*sc,4*sc,32*sc); X.fillRect(p.x+18*sc,p.y-30*sc,4*sc,32*sc);
  X.fillStyle='#a07838'; X.fillRect(p.x-22*sc,p.y-32*sc,44*sc,3*sc);
  X.strokeStyle='#887050'; X.lineWidth=1.5*sc;
  for(let i=0;i<4;i++){
    const rx=p.x-14*sc+i*10*sc; X.beginPath(); X.moveTo(rx,p.y-31*sc); X.lineTo(rx,p.y-20*sc); X.stroke();
    X.fillStyle='#d4881c'; X.beginPath(); X.ellipse(rx,p.y-18*sc+Math.sin(t+i)*1.5*sc,5*sc,3*sc,.3,0,Math.PI*2); X.fill();
  }
  X.fillStyle='rgba(255,255,255,.85)'; X.font=`bold ${11*sc}px sans-serif`; X.textAlign='center'; X.fillText(`🐟 干物台 Lv.${dryRackLevel}`,p.x,p.y+12*sc);
}
function drawFishHut(wx,wy){
  const p=toScreen(wx,wy), sc=SCALE;
  if(!hasFishHut){
    drawShadow(p.x,p.y+4*sc,25,12);
    X.strokeStyle='rgba(120,85,45,.75)'; X.lineWidth=2*sc; X.setLineDash([6*sc,4*sc]);
    X.beginPath(); X.ellipse(p.x,p.y-8*sc,34*sc,18*sc,0,0,Math.PI*2); X.stroke(); X.setLineDash([]);
    X.fillStyle='rgba(255,255,255,.72)'; X.font=`bold ${10*sc}px sans-serif`; X.textAlign='center'; X.fillText('🏠 釣り小屋予定地',p.x,p.y+18*sc);
    return;
  }
  drawShadow(p.x,p.y+4*sc,28,14);
  X.fillStyle='#b89050'; X.beginPath(); X.moveTo(p.x,p.y-8*sc); X.lineTo(p.x+30*sc,p.y); X.lineTo(p.x,p.y+8*sc); X.lineTo(p.x-30*sc,p.y); X.closePath(); X.fill();
  X.fillStyle='#a07838'; X.beginPath(); X.moveTo(p.x-30*sc,p.y); X.lineTo(p.x,p.y+8*sc); X.lineTo(p.x,p.y-20*sc); X.lineTo(p.x-30*sc,p.y-28*sc); X.closePath(); X.fill();
  X.fillStyle='#c8a860'; X.beginPath(); X.moveTo(p.x,p.y+8*sc); X.lineTo(p.x+30*sc,p.y); X.lineTo(p.x+30*sc,p.y-28*sc); X.lineTo(p.x,p.y-20*sc); X.closePath(); X.fill();
  X.fillStyle='#f0f2f8'; X.beginPath(); X.moveTo(p.x,p.y-43*sc); X.lineTo(p.x+34*sc,p.y-26*sc); X.lineTo(p.x,p.y-16*sc); X.lineTo(p.x-34*sc,p.y-26*sc); X.closePath(); X.fill();
  X.fillStyle='rgba(0,0,0,.62)'; X.beginPath(); X.arc(p.x,p.y-50*sc,16*sc,0,Math.PI*2); X.fill();
  X.fillStyle='#fff'; X.font=`bold ${9*sc}px sans-serif`; X.textAlign='center'; X.textBaseline='middle'; X.fillText(`${Math.floor(FISHHUT.stock)}/${FISHHUT.maxStock}`,p.x,p.y-50*sc); X.textBaseline='alphabetic';
  X.fillStyle='rgba(255,255,255,.85)'; X.font=`bold ${11*sc}px sans-serif`; X.fillText(`🏠 小屋 Lv.${hutLevel}`,p.x,p.y+17*sc);
}
function drawStackItem(sx,sy,type){
  const sc=SCALE, isDried=type==='dried', isCooked=type==='cooked';
  X.fillStyle=isDried?'#c0701a':isCooked?'#d4881c':'#ff8c42';
  X.beginPath(); X.ellipse(sx,sy,10*sc,4.5*sc,-.15,0,Math.PI*2); X.fill();
  X.strokeStyle=isDried?'rgba(60,30,0,.3)':'rgba(255,255,255,.55)'; X.lineWidth=1*sc; X.beginPath(); X.moveTo(sx-5*sc,sy); X.lineTo(sx+5*sc,sy); X.stroke();
}
function drawCharacter(wx,wy,opts={}){
  const p=toScreen(wx,wy), sc=SCALE*(opts.scale||1);
  const raw=opts.rawFish||0, cooked=opts.cookedFish||0, dried=opts.driedFish||0, moving=!!opts.isMoving, phase=opts.phase||0, isPlayer=!!opts.isPlayer;
  const bob=moving?Math.sin(phase*8)*2.5*sc:0;
  drawShadow(p.x,p.y+2*sc,14*(opts.scale||1),7*(opts.scale||1));
  X.fillStyle='#2a2a3a'; X.beginPath(); X.ellipse(p.x-5*sc,p.y-1*sc,5*sc,3*sc,0,0,Math.PI*2); X.ellipse(p.x+5*sc,p.y-1*sc,5*sc,3*sc,0,0,Math.PI*2); X.fill();
  const g=X.createLinearGradient(p.x,p.y-28*sc+bob,p.x,p.y-3*sc+bob); g.addColorStop(0,isPlayer?'#5ab8f0':'#70b8e8'); g.addColorStop(1,isPlayer?'#3090d0':'#4898c8');
  X.fillStyle=g; X.beginPath(); X.moveTo(p.x-12*sc,p.y-3*sc+bob); X.quadraticCurveTo(p.x-14*sc,p.y-16*sc+bob,p.x-9*sc,p.y-26*sc+bob); X.quadraticCurveTo(p.x,p.y-32*sc+bob,p.x+9*sc,p.y-26*sc+bob); X.quadraticCurveTo(p.x+14*sc,p.y-16*sc+bob,p.x+12*sc,p.y-3*sc+bob); X.closePath(); X.fill();
  X.fillStyle='#ffe4c4'; X.beginPath(); X.arc(p.x,p.y-28*sc+bob,7*sc,.2,Math.PI-.2); X.fill();
  X.fillStyle='#333'; X.beginPath(); X.arc(p.x-2.5*sc,p.y-28.5*sc+bob,1.3*sc,0,Math.PI*2); X.arc(p.x+2.5*sc,p.y-28.5*sc+bob,1.3*sc,0,Math.PI*2); X.fill();
  X.fillStyle=isPlayer?'#3a90d0':'#4090c0'; X.beginPath(); X.arc(p.x,p.y-31*sc+bob,10*sc,Math.PI,0); X.fill();
  X.fillStyle='#fff'; X.beginPath(); X.arc(p.x,p.y-40*sc+bob,3*sc,0,Math.PI*2); X.fill();
  if(isPlayer){ X.strokeStyle='rgba(90,220,100,.6)'; X.lineWidth=1.5*sc; X.setLineDash([4*sc,3*sc]); X.beginPath(); X.ellipse(p.x,p.y-1*sc,17*sc,9*sc,0,0,Math.PI*2); X.stroke(); X.setLineDash([]); }
  const total=raw+cooked+dried;
  if(total>0){
    let sy=p.y-43*sc+bob, si=0;
    for(let i=0;i<Math.min(raw,5);i++) drawStackItem(p.x,sy-(si++)*5.5*sc,'raw');
    for(let i=0;i<Math.min(cooked,5);i++) drawStackItem(p.x,sy-(si++)*5.5*sc,'cooked');
    for(let i=0;i<Math.min(dried,5);i++) drawStackItem(p.x,sy-(si++)*5.5*sc,'dried');
    X.fillStyle='rgba(0,0,0,.55)'; X.beginPath(); X.arc(p.x+14*sc,sy-Math.min(total,6)*5.5*sc-8*sc,9*sc,0,Math.PI*2); X.fill();
    X.fillStyle='#fff'; X.font=`bold ${10*sc}px sans-serif`; X.textAlign='center'; X.textBaseline='middle'; X.fillText(String(total),p.x+14*sc,sy-Math.min(total,6)*5.5*sc-8*sc); X.textBaseline='alphabetic';
  }
}
function drawFishInWater(f){
  if(!f.alive) return;
  const p=toScreen(f.x,f.y), sc=SCALE, t=performance.now()*.001;
  X.save(); X.translate(p.x,p.y); X.rotate(f.swimAngle+Math.sin(t*f.swimSpeed)*.3);
  X.fillStyle='#ff8844'; X.globalAlpha=.85; X.beginPath(); X.ellipse(0,0,11*sc,5*sc,0,0,Math.PI*2); X.fill();
  X.beginPath(); X.moveTo(-9*sc,0); X.lineTo(-15*sc,-5*sc); X.lineTo(-15*sc,5*sc); X.closePath(); X.fill();
  X.globalAlpha=1; X.fillStyle='#fff'; X.beginPath(); X.arc(6*sc,-1*sc,2.2*sc,0,Math.PI*2); X.fill(); X.fillStyle='#111'; X.beginPath(); X.arc(6.5*sc,-1*sc,1.1*sc,0,Math.PI*2); X.fill();
  X.restore();
}
function drawActionRing(wx,wy,progress,color){
  if(progress <= 0) return;
  const p=toScreen(wx,wy), sc=SCALE;
  X.strokeStyle=color; X.lineWidth=3*sc; X.lineCap='round'; X.beginPath(); X.arc(p.x,p.y-15*sc,22*sc,-Math.PI/2,-Math.PI/2+Math.PI*2*Math.min(1,progress)); X.stroke(); X.lineCap='butt';
}
function drawParticles(){
  for(const p of particles){
    const sx=(p.x-cam.x)*SCALE+W/2, sy=(p.y-cam.y)*SCALE+H/2;
    if(p.type==='snow'){
      const a=Math.min(1,p.life/1.5)*.6; X.fillStyle=`rgba(255,255,255,${a})`; X.beginPath(); X.arc(sx,sy,p.size*SCALE,0,Math.PI*2); X.fill();
    }else{
      const a=Math.min(1,p.life/.5)*.3; X.fillStyle=`rgba(180,180,180,${a})`; X.beginPath(); X.arc(sx,sy,p.size*SCALE*(1+(1-p.life/.6)*.5),0,Math.PI*2); X.fill();
    }
  }
  for(const item of flyingItems){
    const t=Math.min(1,item.progress), ease=1-(1-t)*(1-t);
    const wx=item.fromX+(item.toX-item.fromX)*ease, wy=item.fromY+(item.toY-item.fromY)*ease;
    const p=toScreen(wx,wy-30*Math.sin(t*Math.PI));
    drawStackItem(p.x,p.y,item.type);
  }
  for(const ft of floatingTexts){
    const sx=(ft.x-cam.x)*SCALE+W/2, sy=(ft.y-cam.y)*SCALE+H/2;
    X.globalAlpha=ft.alpha; X.fillStyle=ft.color; X.strokeStyle='rgba(0,0,0,.5)'; X.lineWidth=3*SCALE; X.font=`bold ${16*SCALE}px sans-serif`; X.textAlign='center'; X.strokeText(ft.text,sx,sy); X.fillText(ft.text,sx,sy); X.globalAlpha=1;
  }
}
function render(){
  drawGround();
  for(const f of fishList) drawFishInWater(f);
  for(const tree of trees) drawTree(tree.x,tree.y,tree.s);
  for(const s of snowballs) drawSnowball(s);
  for(const post of fencePosts) drawFencePost(post.x,post.y);
  drawCampfire(CAMPFIRE.x,CAMPFIRE.y);
  drawSellStand(SELLZONE.x,SELLZONE.y);
  drawWorkerHut(WORKERHUT.x,WORKERHUT.y);
  drawDryRack(DRYRACK.x,DRYRACK.y);
  drawFishHut(FISHHUT.x,FISHHUT.y);

  const actors = [
    ...npcs.map(n => ({type:'npc', y:n.y, obj:n})),
    {type:'player', y:player.y, obj:player}
  ].sort((a,b)=>a.y-b.y);
  for(const a of actors){
    if(a.type==='player') drawCharacter(player.x,player.y,{rawFish:player.rawFish,cookedFish:player.cookedFish,driedFish:player.driedFish,isMoving:player.moving,phase:player.walkPhase,isPlayer:true,scale:1});
    else drawCharacter(a.obj.x,a.obj.y,{rawFish:a.obj.rawFish,cookedFish:a.obj.cookedFish,driedFish:a.obj.driedFish,isMoving:a.obj.moving,phase:a.obj.walkPhase,isPlayer:false,scale:.92});
  }
  const actionColors = { fishing:'#ff8844', hut:'#ffb070', cooking:'#ffcc33', drying:'#d4881c', selling:'#ffd700' };
  drawActionRing(player.x, player.y, player.actionProgress, actionColors[player.actionKind] || '#fff');
  drawParticles();
}

// ===== SAVE / LOAD =====
function saveGame(manual=false){
  const data = {
    money,xp,level,capCost,spdCost,workerCost,npcCapLevel,npcCapCost,npcSpdLevel,npcSpdCost,campfireLevel,campfireUpgCost,dryRackLevel,dryRackUpgCost,hutLevel,hutUpgCost,dryCost,hutCost,hasDryRack,hasFishHut,
    player:{speed:player.speed,capacity:player.capacity,rawFish:player.rawFish,cookedFish:player.cookedFish,driedFish:player.driedFish,x:player.x,y:player.y},
    hut:{stock:FISHHUT.stock,maxStock:FISHHUT.maxStock,timer:FISHHUT.timer},
    npcCount:npcs.length
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  if(manual) addFloatingText(player.x, player.y, '💾 Saved', '#aaddff');
}
function loadGame(){
  const saved = localStorage.getItem(SAVE_KEY);
  if(!saved) return;
  try{
    const d = JSON.parse(saved);
    money = d.money || 0; xp = d.xp || 0; level = d.level || 1;
    capCost = d.capCost || capCost; spdCost = d.spdCost || spdCost; workerCost = d.workerCost || workerCost;
    npcCapLevel = d.npcCapLevel || 0; npcCapCost = d.npcCapCost || npcCapCost;
    npcSpdLevel = d.npcSpdLevel || 1; npcSpdCost = d.npcSpdCost || npcSpdCost;
    campfireLevel = d.campfireLevel || 1; campfireUpgCost = d.campfireUpgCost || campfireUpgCost;
    dryRackLevel = d.dryRackLevel || 1; dryRackUpgCost = d.dryRackUpgCost || dryRackUpgCost;
    hutLevel = d.hutLevel || 1; hutUpgCost = d.hutUpgCost || hutUpgCost;
    dryCost = d.dryCost || dryCost; hutCost = d.hutCost || hutCost;
    hasDryRack = !!d.hasDryRack; hasFishHut = !!d.hasFishHut;
    if(d.player){
      player.speed = d.player.speed || player.speed; player.capacity = d.player.capacity || player.capacity;
      player.rawFish = d.player.rawFish || 0; player.cookedFish = d.player.cookedFish || 0; player.driedFish = d.player.driedFish || 0;
      player.x = d.player.x || player.x; player.y = d.player.y || player.y;
    }
    if(d.hut){
      FISHHUT.stock = d.hut.stock || 0;
      FISHHUT.maxStock = d.hut.maxStock || FISHHUT.maxStock;
      FISHHUT.timer = d.hut.timer || 0;
    }
    npcs = [];
    for(let i=0;i<(d.npcCount || 0);i++) npcs.push(createNPC());
    refreshNPCStats();
  }catch(e){
    console.error('セーブデータの読み込みに失敗しました', e);
  }
}
function resetGame(){
  if(confirm('セーブデータを消去して初期状態にリセットしますか？')){
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
}

// ===== MAIN LOOP =====
let lastTime = performance.now();
function gameLoop(now){
  try{
    const dt = Math.min((now - lastTime) / 1000, .05);
    lastTime = now;
    update(dt);
    render();
  }catch(e){
    console.error('Game loop error:', e);
  }
  requestAnimationFrame(gameLoop);
}
loadGame();
updateHUD();
requestAnimationFrame(gameLoop);
setInterval(() => saveGame(false), 5000);
</script>
